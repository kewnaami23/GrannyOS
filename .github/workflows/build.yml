name: GrannyOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git curl openjdk-11-jdk bc bison build-essential flex g++-multilib gcc-multilib libncurses5-dev libssl-dev python3 wget

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Verify repo
        run: repo --version

      - name: Create workspace
        run: mkdir workspace

      - name: Init Android source
        run: |
          cd workspace
          repo init -u https://android.googlesource.com/platform/manifest -b android-14.0.0_rXX

      - name: Sync source
        run: |
          cd workspace
          repo sync -j2

      - name: Build (placeholder)
        run: |
          echo "Build step will come after device tree setup"
